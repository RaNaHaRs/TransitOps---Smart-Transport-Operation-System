spring.application.name=TransitOps
spring.config.import=optional:file:.env[.properties]
# Keep the API on a separate port in development.  The Vite/React dev server
# owns port 8080, so browsing http://localhost:8080 loads the React app.
server.port=8081

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/transitops?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Development bootstrap account. Change these values before deploying the application.
transitops.bootstrap.admin.name=System Administrator
transitops.bootstrap.admin.email=admin@transitops.com
transitops.bootstrap.admin.password=${BOOTSTRAP_ADMIN_PASSWORD}
transitops.security.jwt.secret=${JWT_SECRET}
transitops.security.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
